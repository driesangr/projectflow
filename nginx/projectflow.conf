# ─────────────────────────────────────────────────────────────────────────────
# Project Flow – nginx Reverse Proxy (Production)
#
# Einsatzort: /etc/nginx/sites-available/projectflow.conf
# Aktivieren:  ln -s /etc/nginx/sites-available/projectflow.conf \
#                     /etc/nginx/sites-enabled/
#
# Phase 1 (kein SSL, nur IP):     server_name _;
# Phase 2 (mit Domain + SSL):     certbot --nginx -d yourdomain.com
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name _;   # Später durch Domain ersetzen: yourdomain.com www.yourdomain.com

    # ── Frontend (Vue SPA) ────────────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Backend API ───────────────────────────────────────────────────────────
    location /api/ {
        rewrite            ^/api/(.*) /$1 break;
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket-Support (für künftige Realtime-Features)
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }

    # ── Sicherheits-Header ────────────────────────────────────────────────────
    add_header X-Frame-Options       "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header Referrer-Policy       "strict-origin" always;
}

# ─────────────────────────────────────────────────────────────────────────────
# SSL-Konfiguration (wird von certbot automatisch ergänzt):
#
#   apt install certbot python3-certbot-nginx
#   certbot --nginx -d yourdomain.com -d www.yourdomain.com
# ─────────────────────────────────────────────────────────────────────────────
